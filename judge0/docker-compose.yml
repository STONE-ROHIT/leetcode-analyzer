# This is Judge0's official docker-compose.yml (github.com/judge0/judge0),
# unmodified. It needs `privileged: true` for the sandboxing it does per
# submission - that's why this doesn't run on typical free PaaS tiers
# (Render/Railway free tiers don't grant privileged containers). Deploy this
# on a real VM instead - see /README.md for the Oracle Cloud Always Free
# instructions (genuinely free, persistent, enough resources for this).
#
# Usage (run from this folder, on the VM):
#   docker compose up -d
#   docker compose ps          # wait until all 4 services are healthy
#   curl http://localhost:2358/system_info
#
# Your apps/server/.env JUDGE0_BASE_URL should point at this VM's address
# on port 2358, e.g. http://<vm-public-ip>:2358

x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:
  server:
    image: judge0/judge0:latest
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    <<: *default-logging
    restart: always

  worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    volumes:
      - ./judge0.conf:/judge0.conf:ro
    privileged: true
    <<: *default-logging
    restart: always

  db:
    image: postgres:16.2
    env_file: judge0.conf
    volumes:
      - data:/var/lib/postgresql/data/
    <<: *default-logging
    restart: always

  redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: judge0.conf
    <<: *default-logging
    restart: always

volumes:
  data:
